<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 40" width="140" height="40">
  <rect width="140" height="40" rx="6" fill="#000000" stroke="#333333" stroke-width="1"/>
  <!-- Apple Wallet Cards Icon -->
  <g transform="translate(10, 8)">
    <!-- Red Card -->
    <rect x="0" y="6" width="18" height="12" rx="2" fill="#ff453a" transform="rotate(-15 9 12)"/>
    <!-- Yellow Card -->
    <rect x="2" y="3" width="18" height="12" rx="2" fill="#ffcc00" transform="rotate(-5 11 9)"/>
    <!-- Blue Card -->
    <rect x="4" y="0" width="18" height="12" rx="2" fill="#0a84ff"/>
    <!-- Card stripes/designs -->
    <line x1="6" y1="3" x2="20" y2="3" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
    <circle cx="8" cy="8" r="1.5" fill="#ffffff" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="38" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#ffffff" font-weight="600" letter-spacing="0.2">Add to</text>
  <text x="38" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" font-weight="bold" letter-spacing="0.2">Apple Wallet</text>
</svg>
