<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 40" width="140" height="40">
  <rect width="140" height="40" rx="6" fill="#000000" stroke="#333333" stroke-width="1"/>
  <!-- Google Wallet Icon -->
  <g transform="translate(10, 10)">
    <!-- Blue loop -->
    <path d="M4,10 C4,6.7 6.7,4 10,4 L16,4" fill="none" stroke="#4285F4" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Red loop -->
    <path d="M16,4 C19.3,4 22,6.7 22,10 L22,14" fill="none" stroke="#EA4335" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Yellow loop -->
    <path d="M22,14 C22,17.3 19.3,20 16,20 L10,20" fill="none" stroke="#FBBC05" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Green loop -->
    <path d="M10,20 C6.7,20 4,17.3 4,14 L4,10" fill="none" stroke="#34A853" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Inner card overlap -->
    <rect x="7" y="8" width="12" height="7" rx="1" fill="#4285F4"/>
    <line x1="9" y1="10" x2="17" y2="10" stroke="#ffffff" stroke-width="1"/>
  </g>
  <!-- Text -->
  <text x="38" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8.5" fill="#ffffff" font-weight="600" letter-spacing="0.2">Add to</text>
  <text x="38" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#ffffff" font-weight="bold" letter-spacing="0.2">Google Wallet</text>
</svg>
